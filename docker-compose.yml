# GovTech Full-Stack Orchestration
services:
  # --- CORE APPLICATION ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gov_api_base:latest
    container_name: gov_intelligence_api
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:***REMOVED***@db:5432/gov_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=***REMOVED***
      - MINIO_SECRET_KEY=***REMOVED***
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_API_KEY=***REMOVED***
    depends_on:
      - db
      - redis
      - minio
      - meilisearch
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # --- WORKER: SCRAPER (Engine 1.0) ---
  worker_scraper:
    image: gov_api_base:latest
    container_name: gov_worker_scraper
    command: celery -A backend.app.core.celery_app worker --loglevel=info -Q scrape_queue
    environment:
      - DATABASE_URL=postgresql://admin:***REMOVED***@db:5432/gov_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=***REMOVED***
      - MINIO_SECRET_KEY=***REMOVED***
      - C_FORCE_ROOT=1
    depends_on:
      - redis
      - db
      - minio
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # --- SCHEDULER: CELERY BEAT ---
  celery_beat:
    image: gov_api_base:latest
    container_name: gov_celery_beat
    command: celery -A backend.app.core.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://admin:***REMOVED***@db:5432/gov_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=***REMOVED***
      - MINIO_SECRET_KEY=***REMOVED***
      - C_FORCE_ROOT=1
    depends_on:
      - redis
      - db
      - minio
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

  # --- DATABASE: POSTGRES (Metadata & Graph) ---
  db:
    image: postgres:15-alpine
    container_name: gov_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ***REMOVED***
      POSTGRES_DB: gov_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # --- GRAPH DATABASE: NEO4J (Engine 2.0) ---
  neo4j:
    image: neo4j:5.23.0
    container_name: gov_neo4j
    environment:
      - NEO4J_AUTH=neo4j/***REMOVED***
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474" # Browser HTTP
      - "7687:7687" # Bolt connection
    volumes:
      - neo4j_data:/data
    restart: always

  # --- QUEUE & CACHE: REDIS ---
  redis:
    image: redis:7-alpine
    container_name: gov_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # --- OBJECT STORAGE: MINIO ---
  minio:
    image: minio/minio
    container_name: gov_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ***REMOVED***
      MINIO_ROOT_PASSWORD: ***REMOVED***
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  # --- SEARCH ENGINE: MEILISEARCH ---
  meilisearch:
    image: getmeili/meilisearch:v1.3
    container_name: gov_search
    environment:
      - MEILI_MASTER_KEY=***REMOVED***
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    restart: always

  # --- NLP ENGINE ---
  nlp_engine:
    image: gov_api_base:latest
    container_name: gov_nlp
    command: python backend_nlp/server/manage.py runserver 0.0.0.0:8001
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://admin:***REMOVED***@db:5432/gov_db
    depends_on:
      - db
    volumes:
      - ./backend_nlp:/app/backend_nlp
    restart: unless-stopped

  # --- PARLI BACKEND (Django) ---
  parli_backend:
    image: gov_api_base:latest
    container_name: gov_parli
    command: python Parli_backend/manage.py runserver 0.0.0.0:8080
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://admin:***REMOVED***@db:5432/gov_db
    depends_on:
      - db
    volumes:
      - ./Parli_backend:/app/Parli_backend
    restart: unless-stopped

  # --- FRONTEND CITIZEN ---
  frontend:
    build:
      context: ./frontend-citizen
    container_name: gov_frontend
    ports:
      - "5173:5173"
    depends_on:
      - app
      - nlp_engine
      - parli_backend
    volumes:
      - ./frontend-citizen:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  neo4j_data:
